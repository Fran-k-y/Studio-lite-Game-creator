<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Publish Service | Mobile Studio</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #333; }
        h1 { color: #ff4d4d; text-align: center; font-size: 24px; margin-bottom: 30px; }
        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #bbb; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        .warning { color: #ff4d4d; font-size: 10px; margin-top: 5px; }
        button { width: 100%; padding: 15px; background: #ff4d4d; border: none; border-radius: 6px; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff3333; }
        #status { margin-top: 20px; padding: 15px; background: #000; border-radius: 6px; font-family: monospace; font-size: 12px; color: #00ff00; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EZ PUBLISH CLOUD</h1>
        <label>Roblox API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your API Key here...">
        <p class="warning">⚠️ Key must have 'Universe: Write' permissions</p>

        <label>Template Place ID</label>
        <input type="text" id="templateId" value="95206881">

        <label>Amount to Create</label>
        <input type="number" id="amount" value="1">

        <button onclick="startCreation()">START CREATING</button>
        <div id="status">> Ready for deployment...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
